name: Wake up Streamlit App

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install curl_cffi

      - name: Run resume script
        run: |
          python streamlit_resume.py
